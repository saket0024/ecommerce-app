apiVersion: v1
kind: ConfigMap
metadata:
  name: ecommerce-config
  namespace: ecommerce
data:
  SPRING_PROFILES_ACTIVE: "prod"
  SPRING_DATASOURCE_URL: "jdbc:mysql://mysql-service:3306/ecommerce_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
  SPRING_DATASOURCE_USERNAME: "ecommerce_user"
  DB_HOST: "mysql-service"
  DB_PORT: "3306"
  DB_NAME: "ecommerce_db"
  JWT_EXPIRATION: "86400000"
  JWT_REFRESH_EXPIRATION: "604800000"
  APP_NAME: "ecommerce-backend"
  REACT_APP_API_URL: "https://api.ecommerce.com/api/v1"
  LOGGING_LEVEL_ROOT: "DEBUG"
  LOGGING_LEVEL_COM_ECOMMERCE: "DEBUG"
  LOGGING_LEVEL_ORG_SPRINGFRAMEWORK: "DEBUG"
  # Run Actuator on a separate port so k8s probes bypass Spring Security
  MANAGEMENT_SERVER_PORT: "8081"
  # HikariCP: retry DB connection indefinitely on startup instead of failing after 1ms
  SPRING_DATASOURCE_HIKARI_INITIALIZATION_FAIL_TIMEOUT: "-1"
