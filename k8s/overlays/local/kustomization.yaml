apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Reference the base directory (kustomize loads k8s/base/kustomization.yaml)
resources:
  - ../../base

# Replace remote image names with locally built ones
images:
  - name: ghcr.io/saket0024/ecommerce-backend
    newName: ecommerce-backend
    newTag: local
  - name: ghcr.io/saket0024/ecommerce-frontend
    newName: ecommerce-frontend
    newTag: local

patches:
  # Use local images — never pull from registry
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Never
    target:
      kind: Deployment
      name: backend

  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Never
    target:
      kind: Deployment
      name: frontend

  # Scale down to 1 replica locally to save resources
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment

  # Expose backend via NodePort 30088
  - patch: |-
      - op: replace
        path: /spec/type
        value: NodePort
      - op: add
        path: /spec/ports/0/nodePort
        value: 30088
    target:
      kind: Service
      name: backend-service

  # Expose frontend via NodePort 30080
  - patch: |-
      - op: replace
        path: /spec/type
        value: NodePort
      - op: add
        path: /spec/ports/0/nodePort
        value: 30080
    target:
      kind: Service
      name: frontend-service
