name: CD - Build Images & Deploy to Kubernetes

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'production'
        type: choice
        options: [production, staging]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/ecommerce-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/ecommerce-frontend

jobs:
  # ============================================================
  # Build & Push Docker Images
  # ============================================================
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.BACKEND_IMAGE }}
            ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
            ${{ env.BACKEND_IMAGE }}:latest
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          target: production
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
            ${{ env.FRONTEND_IMAGE }}:latest
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            REACT_APP_API_URL=https://api.ecommerce.com/api/v1
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================
  # Deploy to Kubernetes
  # ============================================================
  deploy-to-k8s:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build-and-push
    environment:
      name: ${{ github.event.inputs.environment || 'production' }}
      url: https://ecommerce.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Verify cluster connectivity
        run: kubectl cluster-info

      - name: Apply Kubernetes namespace
        run: kubectl apply -f k8s/namespace.yaml

      - name: Apply ConfigMap and Secrets
        run: |
          kubectl apply -f k8s/configmap.yaml
          # Secrets should be pre-configured in the cluster
          # kubectl apply -f k8s/secrets.yaml  # Only in non-prod

      - name: Update backend image tag
        run: |
          sed -i "s|ghcr.io/saket0024/ecommerce-backend:latest|${{ env.BACKEND_IMAGE }}:${{ github.sha }}|g" k8s/backend-deployment.yaml

      - name: Update frontend image tag
        run: |
          sed -i "s|ghcr.io/saket0024/ecommerce-frontend:latest|${{ env.FRONTEND_IMAGE }}:${{ github.sha }}|g" k8s/frontend-deployment.yaml

      - name: Deploy MySQL StatefulSet
        run: kubectl apply -f k8s/mysql-statefulset.yaml

      - name: Deploy Backend
        run: |
          kubectl apply -f k8s/backend-deployment.yaml
          kubectl rollout status deployment/backend -n ecommerce --timeout=300s

      - name: Deploy Frontend
        run: |
          kubectl apply -f k8s/frontend-deployment.yaml
          kubectl rollout status deployment/frontend -n ecommerce --timeout=120s

      - name: Apply Ingress and HPA
        run: |
          kubectl apply -f k8s/ingress.yaml
          kubectl apply -f k8s/hpa.yaml

      - name: Verify deployment health
        run: |
          echo "=== Checking pod status ==="
          kubectl get pods -n ecommerce
          echo ""
          echo "=== Checking services ==="
          kubectl get svc -n ecommerce
          echo ""
          echo "=== Checking HPA ==="
          kubectl get hpa -n ecommerce

      - name: Run smoke tests
        run: |
          # Wait a moment for services to stabilize
          sleep 30
          # Basic connectivity check (adjust URL for your environment)
          kubectl run smoke-test --image=curlimages/curl:latest -n ecommerce \
            --restart=Never --rm -i \
            -- curl -sf http://backend-service:8080/api/v1/products?size=1 || true

      - name: Notify Slack on success
        if: success() && env.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v1.25.0
        with:
          payload: |
            {
              "text": "✅ *Deployment Successful* :rocket:",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "✅ *E-Commerce App deployed successfully*\n*Branch:* ${{ github.ref_name }}\n*Commit:* `${{ github.sha }}`\n*By:* ${{ github.actor }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Notify Slack on failure
        if: failure() && env.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v1.25.0
        with:
          payload: |
            {
              "text": "❌ *Deployment Failed*",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "❌ *E-Commerce App deployment FAILED*\n*Branch:* ${{ github.ref_name }}\n*Commit:* `${{ github.sha }}`\n*By:* ${{ github.actor }}\n*Logs:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Rollback on failure
        if: failure()
        run: |
          echo "Deployment failed! Rolling back..."
          kubectl rollout undo deployment/backend -n ecommerce || true
          kubectl rollout undo deployment/frontend -n ecommerce || true
